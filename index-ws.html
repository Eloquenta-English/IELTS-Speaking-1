<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' https://cdn.pixabay.com;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Workshop</title>
<link rel="manifest" href="manifest-ws.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a14;--bg-card:#0f1521;--border:rgba(255,255,255,.08);--text:#e2e8f0;--text-dim:#6b7280;--cyan:#22d3ee;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:url('https://cdn.pixabay.com/photo/2017/08/06/09/08/engine-2592313_1280.jpg') center/cover fixed;min-height:100vh;padding:32px;line-height:1.6;overflow-x:hidden}
.glass{background:rgba(15,21,33,.7);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:16px}
.set-card{max-width:500px;margin:40px auto;opacity:0;transform:translateY(20px);transition:opacity .8s ease,transform .8s ease;padding:32px}
.set-card.visible{opacity:1;transform:translateY(0)}
h1{font-family:'Montserrat',sans-serif;font-size:2rem;font-weight:800;margin-bottom:24px;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.form-group{margin-bottom:16px}
label{display:block;font-size:.85rem;color:var(--text-dim);margin-bottom:6px}
input,select{width:100%;background:rgba(10,14,23,.8);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:1rem;outline:none}
input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.2)}
.btn{display:block;width:100%;background:var(--cyan);color:#060a14;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;margin-top:16px}
@media(max-width:768px){body{padding:24px}h1{font-size:1.5rem}}
</style>
</head>
<body>
<div class="set-card glass" id="setCard">
  <h1>Vehicle Setup</h1>
  <form id="vehicleForm">
    <div class="form-group"><label>Manufacturer</label><input type="text" id="manufacturer" required></div>
    <div class="form-group"><label>Model</label><input type="text" id="model" required></div>
    <div class="form-group"><label>Year</label><input type="number" id="year" min="1980" max="2025" required></div>
    <div class="form-group"><label>Engine Code (optional)</label><input type="text" id="engine"></div>
    <div class="form-group"><label>Fuel Type</label><select id="fuel" required><option value="">Select...</option><option>Petrol</option><option>Diesel</option><option>Hybrid</option><option>Electric</option></select></div>
    <div class="form-group"><label>Transmission</label><select id="transmission" required><option value="">Select...</option><option>Manual</option><option>Automatic</option><option>CVT</option></select></div>
    <div class="form-group"><label>Drive Type</label><select id="drive" required><option value="">Select...</option><option>2WD</option><option>AWD</option></select></div>
    <button type="submit" class="btn">Save Vehicle</button>
  </form>
</div>
<script>
(function(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw-ws.js'); }
  var saved = localStorage.getItem('vehicleProfile');
  if(saved){ location.href = 'oil-change.html'; return; }
  document.getElementById('vehicleForm').addEventListener('submit',function(e){
    e.preventDefault();
    var profile = {
      manufacturer: document.getElementById('manufacturer').value.trim(),
      model: document.getElementById('model').value.trim(),
      year: document.getElementById('year').value,
      engine: document.getElementById('engine').value.trim(),
      fuel: document.getElementById('fuel').value,
      transmission: document.getElementById('transmission').value,
      drive: document.getElementById('drive').value
    };
    localStorage.setItem('vehicleProfile', JSON.stringify(profile));
    location.href = 'oil-change.html';
  });
  var obs = new IntersectionObserver(function(entries){ entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('visible'); }); },{threshold:0.1});
  obs.observe(document.getElementById('setCard'));
})();
</script>
</body>
</html>
